<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <h1>The CRUD Api</h1>
    <div id="app">
      <section id="productSection">
      <form id="productForm">
        <label for="nameInput">New</label>
        <input type="text" id="nameInput" placeholder="product">
        <label for="priceInput">Set</label>
        <input type="number" id="priceInput" placeholder="price">
        <button>Create</button>
      </form>
      <ul id="productList"></ul>
      </section>
      <section id="orderSection">
      <form id="orderForm">
        <label for="orderInput">New</label>
        <input type="text" id="orderInput" placeholder="order">
        <button>Create</button>
        <ul id="orderList"></ul>
      </form>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
