<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <h1>The CRUD Api</h1>
      <div id="loginContainer">
      <form id="registerForm">
        <input type="name" id="registerName" class="input" placeholder="name">
        <input type="email" id="registerEmail" class="input" placeholder="email">
        <input type="password" id="registerPassword" class="input" placeholder="password">
        <button>Register</button>
      </form>
      <form id="loginForm">
        <input type="email" id="loginEmail" class="input" placeholder="email">
        <input type="password" id="loginPassword" class="input" placeholder="password">
        <button>Login</button>
      </form>
      </div>
        <section id="productSection">
          <h2>Products</h2>
          <form id="createForm">
            <label for="titleInput">New</label>
            <input type="text" id="titleInput">
            <label for="priceInput">Set</label>
            <input type="text" id="priceInput">
            <button class="create-btn">Create</button>
          </form>
          <button id="showProducts">Read</button>
          <ul id="productList"></ul>
        </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
