<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app">
      <h1>The CRUD Api</h1>
      <section id="productSection">
        <h2>Products</h2>
      <form id="productForm">
        <label for="nameInput">New</label>
        <input type="text" id="nameInput" placeholder="product">
        <label for="priceInput">Set</label>
        <input type="number" id="priceInput" placeholder="price">
        <button>Create</button>
      </form>
      <ul id="productList"></ul>
      </section>

      <section id="orderSection">
        <h2>Orders</h2>
      <form id="orderForm">
        <label for="orderInput">New</label>
        <input type="text" id="orderInput" placeholder="order">
        <button>Create</button>
        <ul id="orderList"></ul>
      </form>
      </section>
    </div>

    <script type="module" src="/src/landing.ts"></script>
  </body>
</html>
